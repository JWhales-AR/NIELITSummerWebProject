<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <script src="index.js" defer></script>
        <title>Generic Site</title>
    </head>
    <body>
        <header id="header" class="header">
            <p class="header__website-name">Generic Website</p>
            <div class="header__buttons-wrapper">
                <button id="theme-button" class="header__button circle-button -theme-button">
                    <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-28 346-160H160v-186L28-480l132-134v-186h186l134-132 134 132h186v186l132 134-132 134v186H614L480-28Zm141.5-310.5Q680-397 680-480t-58.5-141.5Q563-680 480-680t-141.5 58.5Q280-563 280-480t58.5 141.5Q397-280 480-280t141.5-58.5ZM480-480Zm0 340 100-100h140v-140l100-100-100-100v-140H580L480-820 380-720H240v140L140-480l100 100v140h140l100 100Zm0-340Z"/></svg>
                </button>
                <button id="menu-button" class="header__button circle-button -menu-button">
                    <svg class="button-icon" xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"/></svg>
                </button>
            </div>
        </header>
        <main>
            <section id="hero" class="hero">
                <div class="hero__banner-wrapper reveal-animated">
                    <div class="hero__banner">
                        <p>Hero Banner Text</p>
                        <p>Proin gravida hendrerit lectus a molestie lorem ipsum dolor.</p>
                    </div>
                    <div class="hero__banner-sub-text">
                        <p>
                            Amet, consectetur adipiscing elit pellentesque habitant morbi tristique senectus et
                            netus et malesuada fames ac turpis egestas integer eget aliquet.
                        </p>
                    </div>
                </div>
                <div class="hero__jump-buttons-wrapper">
                    <button id="to-main-button" class="hero__button round-button">Go To Main</button>
                    <button id="to-about-button" class="hero__button round-button bg-less-button">About Us</button>
                </div>
            </section>
        </main>
    </body>
</html>
